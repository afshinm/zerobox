name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  sync:
    name: Sync Upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync upstream Codex crates
        run: ./sync.sh
      - uses: actions/upload-artifact@v4
        with:
          name: upstream
          path: upstream/
          retention-days: 1

  fmt:
    name: Format
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: upstream
          path: upstream/
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: upstream
          path: upstream/
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libcap-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  test-macos:
    name: Test (macOS)
    needs: sync
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: upstream
          path: upstream/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p zerobox-exec
      - name: Unit tests
        run: cargo test --workspace
      - name: Sandbox smoke test (read allowed)
        run: |
          echo "hello" > /tmp/zerobox-ci-test
          ./target/release/zerobox-exec -- cat /tmp/zerobox-ci-test | grep -q "hello"
      - name: Sandbox smoke test (write blocked)
        run: |
          ! ./target/release/zerobox-exec -- node -e "require('fs').writeFileSync('/tmp/zb-ci','x')" 2>/dev/null
      - name: Sandbox smoke test (--allow-read restricts)
        run: |
          echo "secret" > /tmp/zerobox-ci-test
          ./target/release/zerobox-exec --allow-read=/tmp -- cat /tmp/zerobox-ci-test | grep -q "secret"
          ! ./target/release/zerobox-exec --allow-read=/tmp -- cat /etc/passwd 2>/dev/null

  test-linux:
    name: Test (Linux)
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: upstream
          path: upstream/
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libcap-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p zerobox-exec
      - name: Unit tests (lib only)
        run: cargo test --workspace --lib
