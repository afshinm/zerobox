listen: "0.0.0.0:7000"
data_dir: "/var/lib/zerobox"
log_level: "info"

firecracker:
  binary: "/usr/local/bin/firecracker"
  jailer: "/usr/local/bin/jailer"
  default_kernel: "vmlinux-6.1"
  default_vcpus: 2
  default_memory_mib: 512

networking:
  bridge: "zerobox-br0"
  subnet: "10.20.0.0/16"
  host_port_range: "30000-40000"
  outbound_interface: "auto"

timeouts:
  default_sandbox_timeout_ms: 300000
  max_sandbox_timeout_ms: 18000000

snapshots:
  storage_dir: "/var/lib/zerobox/snapshots"
  max_snapshots_per_sandbox: 50
  auto_snapshot_interval_ms: 0

images:
  cache_dir: "/var/lib/zerobox/images"

auth:
  enabled: false
  tokens: []
